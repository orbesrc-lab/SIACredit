<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIACredit - Autoevaluación CNA</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <style>
        body { background-color: var(--secondary-bg); display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 250px; background: #0f172a; color: #94a3b8; display: flex; flex-direction: column; }
        .sidebar-header { padding: 20px; font-size: 1.25rem; font-weight: 700; color: var(--white); display: flex; align-items: center; gap: 10px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .sidebar-menu { flex: 1; padding: 20px 0; }
        .sidebar-item { padding: 12px 20px; cursor: pointer; display: flex; align-items: center; gap: 10px; text-decoration: none; color: inherit; transition: 0.2s; }
        .sidebar-item:hover, .sidebar-item.active { background: rgba(255, 255, 255, 0.1); color: var(--white); border-left: 3px solid var(--primary-color); }
        .main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .topbar { background: var(--white); padding: 15px 30px; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; }
        .layout-split { display: flex; flex: 1; overflow: hidden; }
        .left-panel { width: 380px; background: var(--white); border-right: 1px solid var(--border-color); display: flex; flex-direction: column; overflow-y: auto; }
        .right-panel { flex: 1; padding: 40px; overflow-y: auto; background: #f8fafc; }
        .factor-header { padding: 15px 20px; font-weight: 700; background: #f1f5f9; border-bottom: 1px solid #e2e8f0; color: #1e293b; }
        .char-item { padding: 15px 20px; border-bottom: 1px solid #f1f5f9; cursor: pointer; transition: 0.2s; }
        .char-item:hover { background: #f8fafc; }
        .char-item.active { background: #eef2ff; border-left: 4px solid var(--primary-color); }
        .eval-card { background: white; border-radius: 12px; padding: 35px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); border: 1px solid #e2e8f0; }
        .cna-badge { padding: 8px 15px; border-radius: 6px; font-weight: 700; font-size: 0.9rem; text-align: center; display: inline-block; }
        .cna-pleno { background: #d1fae5; color: #065f46; border: 1px solid #34d399; }
        .cna-alto { background: #ecfdf5; color: #047857; border: 1px solid #6ee7b7; }
        .cna-aceptable { background: #fffbeb; color: #92400e; border: 1px solid #fcd34d; }
        .cna-insuficiente { background: #fef2f2; color: #991b1b; border: 1px solid #f87171; }
        textarea { width: 100%; min-height: 150px; padding: 15px; border: 1px solid #e2e8f0; border-radius: 8px; font-family: inherit; font-size: 1rem; margin-top: 10px; }
    </style>
</head>
<body>
    <aside class="sidebar">
        <div class="sidebar-header">SIACredit</div>
        <div class="sidebar-menu">
            <a href="dashboard.html" class="sidebar-item">📊 Dashboard</a>
            <a href="evidencias.html" class="sidebar-item">📁 Evidencias</a>
            <a href="autoevaluacion.html" class="sidebar-item active">📝 Autoevaluación</a>
            <a href="informes.html" class="sidebar-item">📄 Informes</a>
            <a href="configuracion.html" class="sidebar-item">⚙️ Configuración</a>
        </div>
        <div style="padding:20px; border-top:1px solid rgba(255,255,255,0.1);">
            <a href="javascript:void(0)" onclick="logout()" class="sidebar-item" style="color:#ef4444;">🚪 Cerrar Sesión</a>
        </div>
    </aside>

    <main class="main-content">
        <header class="topbar">
            <div style="display:flex; align-items:center; gap:15px;">
                <img id="inst_logo" src="" style="height:40px; display:none;">
                <h2 id="inst_name" style="font-size:1.1rem; color:var(--primary-color);">Cargando...</h2>
            </div>
            <div id="userInfo" style="font-weight:600;"></div>
        </header>

        <div class="layout-split">
            <div class="left-panel" id="sidebarFactors"></div>
            <div class="right-panel" id="evalContainer">
                <div style="text-align:center; margin-top:100px; color:#94a3b8;">
                    <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" style="margin-bottom:20px;"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 1 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                    <h3>Selecciona una característica para evaluar</h3>
                    <p>Las calificaciones se guardan automáticamente por programa.</p>
                </div>
            </div>
        </div>
    </main>

    <script>
        function getInstId() {
            try {
                const u = JSON.parse(localStorage.getItem('siac_user'));
                return u ? (u.inst_id || 1) : 1;
            } catch(e) { return 1; }
        }
        function getProgramId() {
            try {
                const u = JSON.parse(localStorage.getItem('siac_user'));
                return u ? (u.program_id || 0) : 0;
            } catch(e) { return 0; }
        }

        const user = JSON.parse(localStorage.getItem('siac_user'));
        if (!user) window.location.href = 'index.html';
        document.getElementById('userInfo').textContent = user.email;

        function logout() { localStorage.removeItem('siac_user'); window.location.href = 'index.html'; }

        async function loadSidebar() {
            try {
                const iId = getInstId();
                const pId = getProgramId();
                const resp = await fetch(`/api/model?inst_id=${iId}&program_id=${pId}`);
                const factors = await resp.json();
                
                const evalsResp = await fetch(`/api/reports/summary?inst_id=${iId}&program_id=${pId}`);
                const summaryData = await evalsResp.json();
                const evals = summaryData.factors || [];
                
                let html = '';
                if (!factors || factors.length === 0) {
                    html = '<div style="padding:20px; text-align:center; color:#64748b;">No se encontraron factores.</div>';
                } else {
                    factors.forEach(f => {
                        const fEval = evals.find(e => e.name.includes(f.name)) || { avg: 0 };
                        html += `<div class="factor-header">${f.number}. ${f.name} <br><small style="color:var(--primary-color)">Promedio Ponderado: ${fEval.avg}</small></div>`;
                        if (f.characteristics) {
                            f.characteristics.forEach(c => {
                                html += `<div class="char-item" onclick="showEval('${f.id}', '${c.id}')" id="char_${c.id}">
                                    <div style="font-weight:600; font-size:0.9rem;">${c.number}. ${c.name}</div>
                                    <div style="font-size:0.8rem; color:#64748b;">Peso: ${c.weight}%</div>
                                </div>`;
                            });
                        }
                    });
                }
                document.getElementById('sidebarFactors').innerHTML = html;
            } catch (err) {
                console.error("Error sidebar:", err);
                document.getElementById('sidebarFactors').innerHTML = '<div style="padding:20px; color:#ef4444;">Error de carga.</div>';
            }
        }

        async function showEval(fId, cId) {
            document.querySelectorAll('.char-item').forEach(el => el.classList.remove('active'));
            const tab = document.getElementById(`char_${cId}`);
            if(tab) tab.classList.add('active');

            try {
                const resp = await fetch(`/api/model?inst_id=${getInstId()}&program_id=${getProgramId()}`);
                const factors = await resp.json();
                const factor = factors.find(f => f.id == fId);
                const char = factor.characteristics.find(c => c.id == cId);

                const evalsResp = await fetch(`/api/evaluations?inst_id=${getInstId()}&program_id=${getProgramId()}`);
                const allEvals = await evalsResp.json();
                const currentEval = allEvals[cId] || { rating: 0, just: '' };

                const container = document.getElementById('evalContainer');
                container.innerHTML = `
                    <div class="eval-card fade-in">
                        <h2 style="margin-bottom:10px; color:#1e293b;">${char.number}. ${char.name}</h2>
                        <p style="color:#64748b; margin-bottom:30px;">Factor ${factor.number}: ${factor.name}</p>

                        <div style="margin-bottom:30px;">
                            <label style="display:block; font-weight:700; margin-bottom:10px;">Calificación Cuantitativa (Escala CNA 1.0 - 5.0)</label>
                            <div style="display:flex; gap:20px; align-items:center;">
                                <input type="number" id="rating_input" min="1" max="5" step="0.1" value="${currentEval.rating || ''}" 
                                    oninput="updateCNA(this.value)"
                                    style="width:120px; padding:15px; border:2px solid var(--primary-color); border-radius:10px; font-size:1.5rem; font-weight:700; text-align:center;">
                                <div id="cna_label" class="cna-badge">Ingrese una nota</div>
                            </div>
                        </div>

                        <div style="margin-bottom:30px;">
                            <label style="display:block; font-weight:700; margin-bottom:10px;">Juicio de Valor (Análisis Cualitativo)</label>
                            <textarea id="just_input" placeholder="Redacte aquí el análisis integral de la característica...">${currentEval.just || ''}</textarea>
                        </div>

                        <button class="btn-primary large" onclick="saveEvaluation('${cId}')" style="width:100%; padding:18px; font-size:1.1rem;">Guardar Evaluación CNA</button>
                    </div>
                `;
                updateCNA(currentEval.rating);
            } catch(e) { console.error("Error showEval:", e); }
        }

        function updateCNA(val) {
            const label = document.getElementById('cna_label');
            if (!val || val == 0) { label.textContent = "Sin calificar"; label.className = "cna-badge"; return; }
            const n = parseFloat(val);
            if (n >= 4.5) { label.textContent = "Se cumple plenamente"; label.className = "cna-badge cna-pleno"; }
            else if (n >= 4.0) { label.textContent = "Se cumple en alto grado"; label.className = "cna-badge cna-alto"; }
            else if (n >= 3.0) { label.textContent = "Se cumple aceptablemente"; label.className = "cna-badge cna-aceptable"; }
            else { label.textContent = "No se cumple"; label.className = "cna-badge cna-insuficiente"; }
        }

        async function saveEvaluation(cId) {
            const rating = document.getElementById('rating_input').value;
            const justification = document.getElementById('just_input').value;

            if (!rating || rating < 1 || rating > 5) { alert("La nota debe estar entre 1.0 y 5.0"); return; }

            const iId = getInstId();
            const pId = getProgramId();
            const resp = await fetch(`/api/evaluations?inst_id=${iId}&program_id=${pId}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    [cId]: { rating: parseFloat(rating), just: justification }
                })
            });

            const result = await resp.json();
            if (resp.ok) {
                alert("Evaluación guardada con éxito.");
                loadSidebar();
            } else { 
                alert("Error al guardar: " + (result.message || "Error desconocido del servidor")); 
            }
        }

        async function init() {
            const instResp = await fetch(`/api/institution?inst_id=${getInstId()}`);
            const inst = await instResp.json();
            document.getElementById('inst_name').textContent = inst.name;
            if(inst.logo_url) { const img = document.getElementById('inst_logo'); img.src = inst.logo_url; img.style.display = 'block'; }
            loadSidebar();
        }

        init();
    </script>
    <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
