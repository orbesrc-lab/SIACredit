<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SKEL - Expertos en Proyectos de Educación Superior</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <style>
        body { background-color: var(--secondary-bg); display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 250px; background: #0f172a; color: #94a3b8; display: flex; flex-direction: column; }
        .sidebar-header { padding: 20px; font-size: 1.25rem; font-weight: 700; color: var(--white); display: flex; align-items: center; gap: 10px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .sidebar-menu { flex: 1; padding: 20px 0; }
        .sidebar-item { padding: 12px 20px; cursor: pointer; display: flex; align-items: center; gap: 10px; text-decoration: none; color: inherit; transition: 0.2s; }
        .sidebar-item:hover, .sidebar-item.active { background: rgba(255, 255, 255, 0.1); color: var(--white); border-left: 3px solid var(--primary-color); }
        
        .main-content { flex: 1; display: flex; flex-direction: column; overflow-y: hidden; }
        .topbar { background: var(--white); padding: 15px 30px; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; }
        
        .layout-split { display: flex; flex: 1; overflow: hidden; }
        .left-panel { width: 350px; background: var(--white); border-right: 1px solid var(--border-color); display: flex; flex-direction: column; overflow-y: auto; }
        .right-panel { flex: 1; padding: 30px; overflow-y: auto; background: var(--secondary-bg); }
        
        .factor-header { padding: 15px 20px; font-weight: 600; background: #f8fafc; border-bottom: 1px solid var(--border-color); color: var(--text-main); font-size: 0.95rem; }
        .char-item { padding: 15px 20px; border-bottom: 1px solid var(--border-color); cursor: pointer; transition: background 0.2s; }
        .char-item:hover { background: #f1f5f9; }
        .char-item.active { background: #eef2ff; border-left: 3px solid var(--primary-color); }
        .char-title { font-weight: 600; color: var(--text-main); font-size: 0.95rem; margin-bottom: 5px; }
        .char-progress { display: flex; align-items: center; gap: 10px; font-size: 0.8rem; color: var(--text-muted); }
        .progress-bar { flex: 1; height: 6px; background: var(--border-color); border-radius: 3px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--primary-color); width: 0%; transition: 0.3s; }

        .aspect-card { background: var(--white); border-radius: 12px; padding: 25px; box-shadow: var(--shadow-sm); border: 1px solid var(--border-color); margin-bottom: 25px; }
        .aspect-card h4 { font-size: 1.1rem; margin-bottom: 15px; color: var(--text-main); border-bottom: 1px solid var(--border-color); padding-bottom: 10px; }
        
        .evidence-list { margin-top: 15px; display: flex; flex-direction: column; gap: 10px; }
        .evidence-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 15px; background: #f8fafc; border: 1px solid var(--border-color); border-radius: 8px; }
        .evidence-name { font-weight: 500; font-size: 0.9rem; display: flex; align-items: center; gap: 8px; }
        .evidence-meta { font-size: 0.8rem; color: var(--text-muted); }
        
        .status { padding: 4px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; }
        .status.aprobado { background: #d1fae5; color: #065f46; }
        .status.revision { background: #fef3c7; color: #92400e; }
        
        .upload-area { margin-top: 15px; border: 2px dashed var(--border-color); border-radius: 8px; padding: 20px; text-align: center; cursor: pointer; transition: 0.2s; background: #fafafa; }
        .upload-area:hover { border-color: var(--primary-color); background: #f5f7ff; }
        .upload-area p { margin: 10px 0 0; font-size: 0.9rem; color: var(--text-muted); }
        .upload-area svg { color: var(--primary-color); }
        
        input[type="file"] { display: none; }
        /* Mobile overrides */
        @media (max-width: 768px) {
            body { overflow-y: auto !important; height: auto !important; }
            .main-content { overflow-y: auto !important; height: auto !important; padding-bottom: 80px !important; }
            .content-area { padding: 15px !important; padding-bottom: 90px !important; }
            .topbar { padding: 12px 15px !important; flex-direction: column; align-items: flex-start; gap: 8px; }
        }    </style>
</head>
<body>
    <aside class="sidebar">
        <div class="sidebar-header">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="var(--primary-color)" stroke-width="2"/>
            </svg>
            SIACredit
        </div>
        <div class="sidebar-menu">
            <a href="dashboard.html" class="sidebar-item">📊 Dashboard</a>
            <a href="evidencias.html" class="sidebar-item active">📁 Evidencias</a>
            <a href="autoevaluacion.html" class="sidebar-item">📝 Autoevaluación</a>
            <a href="informes.html" class="sidebar-item">📄 Informes</a>
            <a href="estadisticas.html" class="sidebar-item">📈 Estadísticas</a>
            <a href="configuracion.html" class="sidebar-item">⚙️ Configuración</a>
        </div>
        <div style="padding: 20px; border-top: 1px solid rgba(255,255,255,0.1);">
            <a href="javascript:void(0)" onclick="logout()" class="sidebar-item" style="color: #ef4444; border:none; background:none;">🚪 Cerrar Sesión</a>
        </div>
    </aside>

    <main class="main-content">
        <header class="topbar">
            <div><h2 style="font-size: 1.25rem; margin: 0;">Gestión de Evidencias (Modelo Acuerdo 01/2025)</h2></div>
            <div style="display: flex; align-items: center; gap: 20px;">
                <button id="themeToggle" class="btn-ghost" style="padding: 5px 10px; font-size: 1.2rem;" title="Cambiar Tema">🌓</button>
                <div id="userInfo" style="font-weight: 500;"></div>
            </div>
        </header>

        <div class="layout-split fade-in">
            <div class="left-panel" id="sidebarFactors"></div>
            <div class="right-panel" id="aspectsContainer"></div>
        </div>
    </main>

    <script src="{{ url_for('static', filename='data.js') }}"></script>
    <script>
        const user = JSON.parse(localStorage.getItem('siac_user')) || { email: 'admin@siacredit.edu.co', role: 'admin' };
        document.getElementById('userInfo').innerHTML = `<span>${user.email}</span> <span class="status ${user.role === 'admin' ? 'aprobado' : 'revision'}" style="margin-left:10px">${user.role.toUpperCase()}</span>`;

        function logout() {
            localStorage.removeItem('siac_user');
            window.location.href = 'login.html';
        }

        async function renderSidebar() {
            const container = document.getElementById('sidebarFactors');
            const model = getDataModel();
            let html = '';
            if (model.length === 0) {
                container.innerHTML = '<div style="padding: 20px; text-align: center;">No hay factores configurados.</div>';
                return;
            }
            model.forEach(factor => {
                html += `<div class="factor-header">Factor ${factor.number}: ${factor.name}</div>`;
                factor.characteristics.forEach(char => {
                    html += `<div class="char-item" onclick="loadAspects('${char.id}')" id="char_tab_${char.id}">
                        <div class="char-title">${char.number} ${char.name}</div>
                        <div class="char-progress"><span>Ver aspectos y evidencias</span></div>
                    </div>`;
                });
            });
            container.innerHTML = html;
        }

        async function loadAspects(charId) {
            document.querySelectorAll('.char-item').forEach(el => el.classList.remove('active'));
            const tab = document.getElementById(`char_tab_${charId}`);
            if (tab) tab.classList.add('active');

            const container = document.getElementById('aspectsContainer');
            const model = getDataModel();
            const response = await fetch(`/api/evidences?inst_id=${getInstId()}&program_id=${getProgramId()}`);
            const evidences = await response.json();
            
            let characteristic = null;
            model.forEach(f => {
                const found = f.characteristics.find(c => c.id === charId);
                if (found) characteristic = found;
            });
            if(!characteristic) return;

            let html = `<h2 style="margin-bottom: 25px;">Característica ${characteristic.number}: ${characteristic.name}</h2>`;
            characteristic.aspects.forEach((aspect, index) => {
                const aspectEvidences = evidences.filter(ev => ev.aspect_id === aspect.id);
                let evHtml = '<div class="evidence-list">';
                aspectEvidences.forEach(ev => {
                    evHtml += `<div class="evidence-item">
                        <div>
                            <div class="evidence-name"><a href="javascript:void(0)" onclick="viewFile('${ev.file_url}', '${ev.name}')">📄 ${ev.name}</a></div>
                            <div class="evidence-meta">Periodo: <b>${ev.period || 'N/A'}</b> | Por: ${ev.user_email} | Dept: ${ev.dependency}</div>
                        </div>
                        <div style="display:flex; gap:10px; align-items:center">
                            <span class="status ${ev.status}">${ev.status.toUpperCase()}</span>
                            <button onclick="updateStatus(${ev.id}, 'aprobado')" class="btn-ghost" style="color:green; border:1px solid green; padding:2px 5px; font-size:0.7rem;">Aprobar</button>
                            <button onclick="updateStatus(${ev.id}, 'rechazado')" class="btn-ghost" style="color:orange; border:1px solid orange; padding:2px 5px; font-size:0.7rem;">Rechazar</button>
                            <button onclick="deleteEvidence(${ev.id})" class="btn-ghost" style="color:red; border:1px solid red; padding:2px 5px; font-size:0.7rem;">Eliminar</button>
                        </div>
                    </div>`;
                });
                evHtml += '</div>';

                html += `<div class="aspect-card">
                    <h4>Aspecto ${index + 1}: ${aspect.text}</h4>
                    <div class="form-group" style="margin-bottom:15px;">
                        <label style="font-size:0.8rem;">Periodo Académico</label>
                        <select id="evidencePeriod_${aspect.id}" style="width:100%; padding:5px; border-radius:4px; border:1px solid #ddd;">
                            <option value="2025-1">2025-1</option>
                            <option value="2024-2">2024-2</option>
                            <option value="2024-1">2024-1</option>
                            <option value="2023-2">2023-2</option>
                            <option value="2023-1">2023-1</option>
                        </select>
                    </div>
                    ${evHtml}
                    <label class="upload-area">
                        <input type="file" onchange="uploadEvidence(this, '${aspect.id}')">
                        <p>Haz clic para subir evidencia técnica</p>
                    </label>
                </div>`;
            });
            container.innerHTML = html;
        }

        async function uploadEvidence(input, aspectId) {
            if(!input.files[0]) return;
            const originalHTML = input.parentElement.innerHTML;
            const formData = new FormData();
            formData.append('file', input.files[0]);
            formData.append('aspect_id', aspectId);
            formData.append('period', document.getElementById(`evidencePeriod_${aspectId}`).value);
            formData.append('email', user.email);
            formData.append('inst_id', getInstId());
            formData.append('program_id', getProgramId());
            
            input.parentElement.innerHTML = '<span style="color:var(--primary-color)">⏳ Subiendo archivo...</span>';
            
            try {
                const resp = await fetch('/api/upload', { method: 'POST', body: formData });
                const result = await resp.json();
                
                if(resp.ok && result.status === 'success') {
                    loadAspects(document.querySelector('.char-item.active').id.replace('char_tab_', ''));
                } else {
                    alert('Error al subir: ' + (result.error || result.message || 'Desconocido'));
                    // Restaurar el botón para reintentar
                    loadAspects(document.querySelector('.char-item.active').id.replace('char_tab_', ''));
                }
            } catch (err) {
                alert('Error de conexión o servidor. Intenta de nuevo.');
                loadAspects(document.querySelector('.char-item.active').id.replace('char_tab_', ''));
            }
        }

        async function updateStatus(id, status) {
            await fetch(`/api/evidences/status?inst_id=${getInstId()}`, {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id, status })
            });
            loadAspects(document.querySelector('.char-item.active').id.replace('char_tab_', ''));
        }

        async function deleteEvidence(id) {
            if(!confirm('¿Eliminar esta evidencia?')) return;
            const resp = await fetch(`/api/evidences/${id}?inst_id=${getInstId()}`, { method: 'DELETE' });
            if(resp.ok) loadAspects(document.querySelector('.char-item.active').id.replace('char_tab_', ''));
        }

        function viewFile(url, name) {
            document.getElementById('viewerModal').style.display = 'flex';
            document.getElementById('viewerTitle').textContent = name;
            if (url.toLowerCase().endsWith('.pdf')) {
                document.getElementById('viewerContent').innerHTML = `<iframe src="${url}" style="width:100%; height:100%; border:none;"></iframe>`;
            } else {
                document.getElementById('viewerContent').innerHTML = `<div style="text-align:center; padding:20px;"><img src="${url}" style="max-width:100%; max-height:100%;"><br><a href="${url}" target="_blank" class="btn-primary" style="margin-top:10px; display:inline-block;">Descargar</a></div>`;
            }
        }

        function closeViewer() { document.getElementById('viewerModal').style.display = 'none'; }

        async function init() {
            await loadDataFromAPI();
            renderSidebar();
            setTimeout(() => { if(document.querySelector('.char-item')) document.querySelector('.char-item').click(); }, 300);
        }
        init();
    </script>

    <div id="viewerModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:9999; justify-content:center; align-items:center;">
        <div style="background:white; width:90%; height:95%; border-radius:8px; position:relative; display:flex; flex-direction:column;">
            <div style="padding:10px 20px; border-bottom:1px solid #eee; display:flex; justify-content:space-between; align-items:center;">
                <h3 id="viewerTitle" style="margin:0;">Visor</h3>
                <button onclick="closeViewer()" style="background:none; border:none; font-size:2rem; cursor:pointer;">&times;</button>
            </div>
            <div id="viewerContent" style="flex:1; overflow:auto;"></div>
        </div>
    </div>
    <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
