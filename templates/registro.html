<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SKEL - Expertos en Proyectos de Educación Superior</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <style>
        .auth-container { display: flex; min-height: 100vh; align-items: center; justify-content: center; background-color: var(--secondary-bg); padding: 20px; }
        .auth-card { background: var(--white); padding: 40px; border-radius: 12px; box-shadow: var(--shadow-lg); width: 100%; max-width: 500px; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .form-group { margin-bottom: 15px; }
        .form-group.full { grid-column: span 2; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 500; font-size: 0.9rem; }
        .form-group input, .form-group select { width: 100%; padding: 10px 15px; border: 1px solid var(--border-color); border-radius: 8px; font-size: 0.95rem; }
        .btn-full { width: 100%; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <h2 style="text-align: center; margin-bottom: 30px;">Crear Cuenta Institucional</h2>
            <form id="registerForm">
                <div class="form-grid">
                    <div class="form-group full">
                        <label>Nombre Completo</label>
                        <input type="text" id="fullName" required placeholder="Ej. Dr. Juan Pérez">
                    </div>
                    <div class="form-group">
                        <label>Email Institucional</label>
                        <input type="email" id="emailInst" required placeholder="juan@universidad.edu.co">
                    </div>
                    <div class="form-group">
                        <label>Email Personal (Recuperación)</label>
                        <input type="email" id="emailPers" required placeholder="juan.personal@gmail.com">
                    </div>
                    <div class="form-group full">
                        <label>Institución a la que perteneces</label>
                        <select id="instSelect" required>
                            <option value="">Cargando instituciones...</option>
                        </select>
                    </div>
                    <div class="form-group full">
                        <label>Contraseña</label>
                        <input type="password" id="password" required placeholder="••••••••">
                    </div>
                </div>
                <button type="submit" class="btn-primary large btn-full">Registrarse</button>
            </form>
            <p style="text-align: center; margin-top: 20px; font-size: 0.9rem; color: var(--text-muted);">
                ¿Ya tienes cuenta? <a href="login.html" style="color: var(--primary-color); text-decoration: none;">Inicia sesión aquí</a>
            </p>
        </div>
    </div>
    <script>
        // Cargar instituciones al cargar la página
        window.addEventListener('DOMContentLoaded', async () => {
            try {
                const resp = await fetch('/api/institutions');
                const institutions = await resp.json();
                const select = document.getElementById('instSelect');
                if (institutions && institutions.length > 0) {
                    select.innerHTML = '<option value="">-- Selecciona tu Institución --</option>' + 
                        institutions.map(i => `<option value="${i.id}">${i.name}</option>`).join('');
                } else {
                    select.innerHTML = '<option value="">No hay instituciones registradas aún</option>';
                }
            } catch (e) {
                document.getElementById('instSelect').innerHTML = '<option value="">Error cargando instituciones</option>';
            }
        });

        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const instId = document.getElementById('instSelect').value;
            if (!instId) {
                alert("Por favor selecciona una institución válida.");
                return;
            }

            const btn = document.querySelector('button[type="submit"]');
            btn.disabled = true;
            btn.textContent = 'Registrando...';
            
            const name = document.getElementById('fullName').value;
            const email = document.getElementById('emailInst').value;
            const password = document.getElementById('password').value;
            
            try {
                // Registrar usuario con rol 'operativo' (permitido por DB) pero con prefijo [PENDING]
                const pendingName = '[PENDING] ' + name;
                const userResp = await fetch(`/api/users?inst_id=${instId}&program_id=0`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name: pendingName, email: email, role: 'operativo', password: password })
                });
                const userResult = await userResp.json();

                if (userResult.status === 'success') {
                    alert('¡Registro exitoso! Tu cuenta ha sido creada y está pendiente de activación por un Administrador del sistema.');
                    window.location.href = 'login.html';
                } else {
                    alert('Error creando usuario: ' + userResult.message);
                }
            } catch (err) {
                alert('Error de conexión con el servidor.');
            }
            btn.disabled = false;
            btn.textContent = 'Registrarse';
        });
    </script>
</body>
</html>
